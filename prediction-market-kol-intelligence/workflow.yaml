name: daily-prediction-market-kol-intelligence
schedule: "Daily 08:00"
steps:
  - id: plan-kol-discovery
    skill: x-kol-discovery
    description: Convert user request into query templates, thresholds, and staged fetch budget.
  - id: fetch-kol-tweets
    description: Read fetched KOL tweet JSONL files or call kv.run /kols/tweets/search in production.
    local_inputs:
      - ../final_data/kol_may_512_5y.jsonl
      - ../final_data/kol_may_513_5y.jsonl
      - ../final_data/kol_may_514_5y.jsonl
  - id: spam-bot-filtering
    skill: spam-bot-filtering
  - id: predictive-tweet-extraction
    skill: predictive-tweet-extraction
  - id: market-outcome-classification
    skill: market-outcome-classification
  - id: kol-quality-scoring
    skill: kol-quality-scoring
  - id: market-matching
    description: Match extracted event records to Polymarket-style market titles and slugs.
    status: deferred_until_market_data_available
  - id: backtest-scoring
    skill: backtest-scoring
    cadence: weekly
    status: deferred_until_resolved_market_data_available
  - id: publish-ranked-signals
    description: Write signals JSONL, KOL leaderboard CSV, latest signal feed CSV, and manual-labeling JSONL.
