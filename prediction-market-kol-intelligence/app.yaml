name: prediction-market-kol-intelligence
version: 0.1.0
description: Extract, score, and rank prediction-market signals from KOL tweets.
default_inputs:
  tweet_jsonl:
    - ../final_data/kol_may_512_5y.jsonl
    - ../final_data/kol_may_513_5y.jsonl
    - ../final_data/kol_may_514_5y.jsonl
outputs:
  signals_jsonl: ../final_data/prediction_market_kol_signals.jsonl
  leaderboard_csv: ../final_data/prediction_market_kol_leaderboard.csv
  signal_feed_csv: ../final_data/prediction_market_kol_signal_feed.csv
  labeling_sample_jsonl: ../final_data/prediction_market_kol_labeling_sample.jsonl
skills:
  - x-kol-discovery
  - kol-quality-scoring
  - predictive-tweet-extraction
  - market-outcome-classification
  - spam-bot-filtering
  - backtest-scoring
datasets:
  - datasets/scoring_rubric.yaml
  - datasets/kol_seed_list.csv
  - datasets/labeled_predictive_tweets.jsonl
  - datasets/resolved_market_examples.jsonl
  - datasets/spam_examples.jsonl
agents:
  - election-kol-ranker
  - crypto-signal-agent
  - geo-event-agent
  - company-event-agent
